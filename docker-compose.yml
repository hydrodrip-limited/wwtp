services:
  wwtp-rnn:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: unless-stopped   # Bug #9 fix
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui-peepypoo:
    build:
      context: .
      dockerfile: Dockerfile.ui.peepypoo
    ports:
      - "8502:8501"
    restart: unless-stopped
    environment:
      - API_URL=http://wwtp-rnn:5000/invocations
      - SCALERS_PATH=/app/scalers.joblib
    volumes:
      - ./app/streamlit_app.py:/app/streamlit_app.py:ro
      - ./app/peepypoo_sim.py:/app/peepypoo_sim.py:ro
    depends_on:
      wwtp-rnn:
        condition: service_healthy
